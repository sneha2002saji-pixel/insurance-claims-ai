pipeline:
  name: insurance-claims-ai
  identifier: insurance_claims_ai
  projectIdentifier: default_project
  orgIdentifier: default
  tags:
    app: insurance-claims-ai

  properties:
    ci:
      codebase:
        connectorRef: Github_Connector_SS
        repoName: insurance-claims-ai
        build:
          type: branch
          spec:
            branch: main

  variables:
    - name: GCP_PROJECT_ID
      type: String
      value: upbeat-repeater-477110-q6
    - name: REGION
      type: String
      value: us-central1
    - name: REGISTRY
      type: String
      value: us-central1-docker.pkg.dev/upbeat-repeater-477110-q6/insurance-claims-ai

  stages:
    # ── Stage 1: Build & push agent image ─────────────────────────────────────
    - stage:
        name: Build Agent
        identifier: build_agent
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Build and push agent image
                  identifier: build_push_agent
                  type: BuildAndPushGAR
                  timeout: 30m
                  spec:
                    connectorRef: GCP_Provider
                    host: us-central1-docker.pkg.dev
                    projectID: <+pipeline.variables.GCP_PROJECT_ID>
                    imageName: insurance-claims-ai/agent
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    context: apps/agent
                    dockerfile: apps/agent/Dockerfile

    # ── Stage 2: Build & push web image ───────────────────────────────────────
    - stage:
        name: Build Web
        identifier: build_web
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Build and push web image
                  identifier: build_push_web
                  type: BuildAndPushGAR
                  timeout: 30m
                  spec:
                    connectorRef: GCP_Provider
                    host: us-central1-docker.pkg.dev
                    projectID: <+pipeline.variables.GCP_PROJECT_ID>
                    imageName: insurance-claims-ai/web
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    context: .
                    dockerfile: apps/web/Dockerfile

    # ── Stage 3: Deploy agent to Cloud Run ────────────────────────────────────
    - stage:
        name: Deploy Agent
        identifier: deploy_agent
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Deploy agent to Cloud Run
                  identifier: deploy_agent_step
                  type: Run
                  spec:
                    shell: Sh
                    envVariables:
                      GCP_SA_KEY: <+secrets.getValue("GCP_Connector_Secret")>
                    command: |
                      printf '%s' "$GCP_SA_KEY" > /tmp/sa-key.json
                      gcloud auth activate-service-account --key-file=/tmp/sa-key.json
                      gcloud run deploy insurance-agent \
                        --image=<+pipeline.variables.REGISTRY>/agent:<+pipeline.sequenceId> \
                        --region=<+pipeline.variables.REGION> \
                        --project=<+pipeline.variables.GCP_PROJECT_ID> \
                        --platform=managed \
                        --no-allow-unauthenticated \
                        --service-account=gcp-harness-sa@<+pipeline.variables.GCP_PROJECT_ID>.iam.gserviceaccount.com \
                        --set-env-vars="GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_CLOUD_PROJECT=<+pipeline.variables.GCP_PROJECT_ID>" \
                        --set-secrets="GCP_PROJECT_ID=GCP_PROJECT_ID:latest,REDIS_URL=REDIS_URL:latest" \
                        --memory=1Gi \
                        --cpu=1 \
                        --min-instances=0 \
                        --max-instances=5 \
                        --port=8000
                      rm -f /tmp/sa-key.json

    # ── Stage 4: Deploy web to Cloud Run ──────────────────────────────────────
    - stage:
        name: Deploy Web
        identifier: deploy_web
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  name: Deploy web to Cloud Run
                  identifier: deploy_web_step
                  type: Run
                  spec:
                    shell: Sh
                    envVariables:
                      GCP_SA_KEY: <+secrets.getValue("GCP_Connector_Secret")>
                    command: |
                      printf '%s' "$GCP_SA_KEY" > /tmp/sa-key.json
                      gcloud auth activate-service-account --key-file=/tmp/sa-key.json
                      AGENT_URL=$(gcloud run services describe insurance-agent \
                        --region=<+pipeline.variables.REGION> \
                        --project=<+pipeline.variables.GCP_PROJECT_ID> \
                        --format="value(status.url)")
                      gcloud run deploy insurance-web \
                        --image=<+pipeline.variables.REGISTRY>/web:<+pipeline.sequenceId> \
                        --region=<+pipeline.variables.REGION> \
                        --project=<+pipeline.variables.GCP_PROJECT_ID> \
                        --platform=managed \
                        --allow-unauthenticated \
                        --service-account=gcp-harness-sa@<+pipeline.variables.GCP_PROJECT_ID>.iam.gserviceaccount.com \
                        --set-env-vars="AGENT_SERVICE_URL=${AGENT_URL},AGENT_SERVICE_URL_INTERNAL=${AGENT_URL}" \
                        --memory=512Mi \
                        --cpu=1 \
                        --min-instances=0 \
                        --max-instances=3 \
                        --port=3000
                      rm -f /tmp/sa-key.json
